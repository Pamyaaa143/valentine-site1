<!DOCTYPE html>
<html>
<head>
<title>For You 💖</title>
<style>
body {
  background: pink;
  text-align: center;
  font-family: Arial;
}

h1 {
  margin-top: 20%;
  font-size: 40px;
  animation: glow 1s infinite alternate;
}

@keyframes glow {
  from { color: red; }
  to { color: white; }
}

button {
  padding: 10px 20px;
  font-size: 18px;
  margin: 10px;
  border: none;
  cursor: pointer;
}

/* YES button */
#yes {
  background: red;
  color: white;
}

/* NO button */
#no {
  background: black;
  color: white;
  position: relative; /* 👈 change kiya */
}
</style>
</head>

<body>

<h1>Will you be my Valentine? 💕</h1>

<button id="yes" onclick="yesClick()">Yes ❤️</button>
<button id="no" onclick="moveNo()">No 💔</button>

<script>
function yesClick() {
  alert("Yayyy ❤️ I knew it!");
}

function moveNo() {
  let btn = document.getElementById("no");

  let x = Math.random() * 300;
  let y = Math.random() * 300;

  btn.style.position = "absolute";
  btn.style.left = x + "px";
  btn.style.top = y + "px";
}
</script>

</body>
</html>
<h1>Will you be my Valentine, *Name*? 💕</h1>
<div class="hearts"></div>

<style>
.hearts::before {
  content: "💖 💕 💘 💝 💓";
  position: fixed;
  top: -50px;
  animation: fall 5s linear infinite;
  font-size: 30px;
}

@keyframes fall {
  0% { top: -50px; }
  100% { top: 100%; }
}
</style>
<audio autoplay loop>
  <source src="your-music.mp3" type="audio/mpeg">
</audio>
